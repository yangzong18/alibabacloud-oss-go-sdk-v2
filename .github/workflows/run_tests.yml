name: Run tests

on:
  push:
    branches:
      - master
      - 'dev-*'
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22', '1.23', '1.26']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6

        with:
          go-version: ${{ matrix.go-version }}
      - run: go vet ./...
      - run: go test -v ./...
